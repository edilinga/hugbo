# Bind to Railway port
server.port=${PORT:8080}

# Session timeout
server.servlet.session.timeout=2d

# Database from Railway env
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}?sslmode=require
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}

# JPA & Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# Flyway migration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# R2 config
cloudflare.r2.account-id=${R2_ACCOUNT_ID}
cloudflare.r2.access-key-id=${R2_ACCESS_KEY_ID}
cloudflare.r2.secret-access-key=${R2_SECRET_ACCESS_KEY}
cloudflare.r2.bucket=${R2_BUCKET}
cloudflare.r2.public-url=${R2_PUBLIC_URL}